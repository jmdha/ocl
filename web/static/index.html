<!doctype html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<link rel="preload" href="/api/logs"     as="fetch" crossorigin>
<link rel="preload" href="/api/runs"     as="fetch" crossorigin>
<link rel="preload" href="/api/players"  as="fetch" crossorigin>
<title>open combat logs</title>
</head>
<body>
<nav>
	<a href="#">wow</a>
	<a href="#">fellowship</a>
	<a href="#">ff14</a>
	<iframe
				src="/upload.html"
				title="upload button"
				id="upload"
				scrolling="no"
				height="0"
				width="0"
				border="0"
	></iframe>
</nav>

<table class="totals">
	<thead>
		<tr>
			<th>Total Logs</th>
			<th>Total Runs</th>
			<th>Total Players</th>
			<th>Queue</th>
		</tr>
	</thead>
	<tbody>
		<tr>
			<td id="total-logs">N/A</td>
			<td id="total-runs">N/A</td>
			<td id="total-players">N/A</td>
			<td id="total-queue">N/A</td>
		</tr>
	</tbody>
<caption>across 3 games</caption>
</table>

<h2>World of Warcraft</h2>
<table class="totals">
	<thead>
		<tr>
			<th>Logs</th>
			<th>Runs</th>
			<th>Players</th>
			<th>Queue</th>
		</tr>
	</thead>
	<tbody>
		<tr>
			<td id="wow-logs">N/A</td>
			<td id="wow-runs">N/A</td>
			<td id="wow-players">N/A</td>
			<td id="wow-queue">N/A</td>
		</tr>
	</tbody>
</table>
</body>
<script>
	async function resizeIframe(iframe) {
	    const doc = iframe.contentDocument || iframe.contentWindow.document;
	    
	    // Wait for the inner document's layout to be ready
	    await new Promise(resolve => iframe.contentWindow.requestAnimationFrame(resolve));
	    
	    const btn = doc.querySelector('#uploadBtn');
	    if (!btn) {
	        console.error('Could not find #uploadBtn inside iframe');
	        return;
	    }
	    
	    const rect = btn.getBoundingClientRect();
	    iframe.style.width  = rect.width  + 'px';
	    iframe.style.height = rect.height + 'px';
	}
	async function setFromAPI(elementId, url) {
		const response = await fetch(url);
		
		if (!response.ok) {
			throw new Error(`HTTP error: ${response.status}`);
		}
		
		const data = await response.json();
		const element = document.getElementById(elementId);
		
		if (!element) {
			throw new Error(`Element with id "${elementId}" not found`);
		}

		element.textContent = data;
	}
	const uploadFrame = document.getElementById('upload')
	uploadFrame.addEventListener('load', () => resizeIframe(uploadFrame))
  	const endpoints = [
  		['total-logs',    '/api/logs'],
  		['total-runs',    '/api/runs'],
  		['total-players', '/api/players'],
  		['total-queue',   '/api/queue'],
  		['wow-logs',      '/api/logs?game=wow'],
  		['wow-runs',      '/api/runs?game=wow'],
  		['wow-players',   '/api/players?game=wow'],
  		['wow-queue',     '/api/queue?game=wow'],
  	];
 
  	for (const [id, url] of endpoints) {
  		setFromAPI(id, url).catch(console.error);
  	}
</script>
</html>
