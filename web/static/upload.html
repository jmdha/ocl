<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<style>
html, body {
	width: fit-content;
	height: fit-content;
	background: transparent;
	padding: 0;
}

#uploadBtn {
	font-size: 11px;
	font-weight: 600;
	letter-spacing: 0.08em;
	text-transform: uppercase;
	cursor: pointer;
	background: #c9a84c;
	color: #fff;
	border-radius: var(--border-radius-md);
	padding: 4px 10px;
}
</style>
<meta charset="UTF-8">
<title>Upload</title>
</head>
<body>
	<input type="file" id="fileInput" webkitdirectory multiple style="display:none">
	<span id="uploadBtn">Upload</span>
<script>
	const input = document.getElementById("fileInput");
	const btn = document.getElementById("uploadBtn");
	
	btn.onclick = () => input.click();
	
	input.onchange = async () => {
		const files = input.files;
		if (!files.length) {
			btn.textContent = "No files selected — try again";
			return;
		}
		btn.disabled = true;
		btn.textContent = `Reading ${files.length} files...`;
		let combined = "";
		for (const file of files) {
			const text = await file.text();
			const path = file.webkitRelativePath
			combined +=
			`---FILE:${path}---
			${text}
			---END---`;
		}
		btn.textContent = "Compressing...";
		const blob = new Blob([combined]);
		const cs = new CompressionStream("gzip");
		const compressedStream = blob.stream().pipeThrough(cs);
		const compressedBlob = await new Response(compressedStream).blob();
		btn.textContent = `Compressed ${blob.size} → ${compressedBlob.size} bytes. Uploading...`;
		const res = await fetch("/api/upload", {
			method: "post",
			body: compressedBlob,
			headers: {
				"Content-Encoding": "gzip",
				"Content-Type":     "application/octet-stream"
			}
		});
		btn.textContent = res.ok ? "✓ Done — Upload another?" : "✗ Upload failed — try again";
		btn.disabled = false;
	};
</script>
</body>
</html>
